<section class="c-section c-section--hero" aria-label="Homepage intro">
  <div class="c-hero">
    <div class="c-hero__body">
      {% if site.data.home.hero.tagline %}
        <h1 class="c-hero__tagline">{{ site.data.home.hero.tagline }}</h1>
      {% endif %}

      {% if site.data.home.hero.lede %}
        <p class="c-hero__lede">{{ site.data.home.hero.lede }}</p>
      {% endif %}
    </div>
  </div>
</section>
