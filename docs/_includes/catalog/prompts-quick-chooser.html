{% assign data = site.data.catalog.policies %}
{% for group in data.quick_chooser %}
  <section class="c-section c-section--thin c-section--chooser-group" aria-label="{{ group.title }}">
    <div class="c-section__header">
      <h3 class="c-section__title c-section__title--sub">{{ group.title }}</h3>
    </div>

    <div class="c-grid {{ group.grid }} c-grid--chooser">
      {% for item in group.items %}
        <a class="c-card c-card--chooser" href="{{ item.url | relative_url }}">
          <div class="c-card__content">
            <div class="c-card__title">{{ item.title }}</div>
            {% if item.desc %}<div class="c-card__desc">{{ item.desc }}</div>{% endif %}
            <div class="c-card__meta">Open section →</div>
