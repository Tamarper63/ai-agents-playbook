intro: "Long-form technical articles (engineering-oriented): threat models, agent/system architecture notes, evaluation methodology, and evidence/citation policy design. Use How-to for procedures and checklists; use Reference for stable lookup pages and canonical diagrams."

browse_by_topic:
  title: "Browse by topic"
  note: "Open a topic page to see its core articles and section resources."
  grid: "c-grid--2"
  items:
    - title: "Agent security"
      url: "/articles/agent-security/"
      desc: "Trust boundaries, authorization & access control, orchestration (control-flow mechanisms), policy enforcement, and observability."
    - title: "Agent architecture"
      url: "/articles/agent-architecture/"
      desc: "Workflows, state and lifecycle management, tool invocation patterns, retrieval and context management, and evaluation harnesses."
    - title: "Model training and evaluation"
      url: "/articles/model-training-and-eval/"
      desc: "Reliability, evaluation methods, calibration, grounding, and benchmark interpretation limits."
    - title: "Prompt engineering"
      url: "/articles/prompt-engineering/"
      desc: "Operational prompting notes, evidence contracts, and reusable prompt assets."

latest:
