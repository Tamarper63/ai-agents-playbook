quick_chooser:
  - title: "Source and citation rules"
    grid: "c-grid--3"
    items:
      - title: "Use only the files you provide for factual answers — policy"
        url: "/policies/facts-only-artifacts-only/"
        desc: "Use only user-provided files, logs, screenshots, or excerpts. No external sources."
      - title: "Use cited public sources for factual answers — policy"
        url: "/policies/facts-only-authoritative-sources-required/"
        desc: "Use cited public sources such as standards, papers, or official documentation."
      - title: "Use web search and cite sources for current or niche claims — policy"
        url: "/policies/web-verification-and-citations/"
        desc: "Add web search, source selection, and citation rules when the answer depends on public information."

  - title: "Verification and review rules"
    grid: "c-grid--2"
    items:
      - title: "Verify claims before final output — policy"
        url: "/policies/chain-of-verification/"
        desc: "Add a deliberate verification pass before the final answer."
      - title: "Check technical writing claims before publication — policy"
        url: "/policies/evidence-gated-technical-writing-policy/"
        desc: "Use for publishable technical writing where non-trivial claims must be checked."
      - title: "Code review: choose the right policy"
        url: "/policies/code-review/"
        desc: "Choose architecture review or implementation review against official guidance."
      - title: "Review architecture boundaries and layering — policy"
        url: "/policies/architecture-boundary-review-policy/"
        desc: "Use when the main question is about system structure, boundaries, ownership, and dependency direction."
      - title: "Check implementation against official guidance — policy"
        url: "/policies/standards-backed-implementation-review-policy/"
        desc: "Use when code or configuration must be checked against official framework, runtime, API, platform, or standards guidance."
      - title: "Check claims and terminology for technical accuracy — policy"
        url: "/policies/semantic-accuracy-gate/"
        desc: "Add a claim check and terminology consistency pass."

  - title: "Output and baseline rules"
    grid: "c-grid--3"
    items:
      - title: "Academic-style output with cited sources and confidence — policy"
        url: "/policies/evidence-gated-academic-mode/"
        desc: "Use when the output must be academic in tone, source-bound, and explicit about confidence."
      - title: "Add an evidence-based confidence score (0–100) — policy"
        url: "/policies/confidence-score/"
        desc: "Append a numeric confidence line with evidence-based scoring rules."
      - title: "Objective technical baseline (no simulation) — policy"
        url: "/policies/objective-technical-operating-profile/"
        desc: "Baseline rules for technical, objective, non-simulative output."
      - title: "Scholarly review rules"
        grid: "c-grid--2"
        items:
          - title: "Scholarly review and evidence synthesis — policy"
            url: "/policies/scholarly-literature-review/"
            desc: "Rules for literature review, evidence synthesis, source comparison, gap mapping, annotated bibliography, and evidence tables."

catalog:
