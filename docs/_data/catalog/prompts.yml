quick_chooser:
  - title: "Stacks (bundles)"
    grid: "c-grid--3"
    items:
      - title: "Stacks (recommended bundles)"
        url: "/prompts/#prompts-stacks"
        desc: "Recommended bundles of templates + components for common goals."

  - title: "Workflow templates"
    grid: "c-grid--3"
    items:
      - title: "Workflow templates (catalog)"
        url: "/prompts/#prompts-catalog"
        desc: "Runnable templates mapped to policies and how-to procedures."
      - title: "Code review"
        url: "/how-to/code-review/"
        desc: "Choose the correct code review path: architecture & boundaries or implementation vs official guidance."


  - title: "Prompt components (micro-prompts)"
    grid: "c-grid--3"
    items:
      - title: "Prompt components (catalog)"
        url: "/prompts/components/"
        desc: "Drop-in micro-prompts that add one behavior."
      - title: "Don’t confirm without evidence"
        url: "/prompts/components/#anti-auto-agreement-user"
        desc: "Prevents automatic agreement with strong user assertions."

  - title: "Related guidance"
    grid: "c-grid--3"
    items:
      - title: "Home"
        url: "/"
        desc: "Primary entry point for choosing the right path from the homepage."
      - title: "How-to guides"
        url: "/how-to/"
        desc: "Step-by-step procedures for running the workflows."
      - title: "Policies"
        url: "/policies/"
        desc: "Normative rules (evidence boundaries, refusals, enforcement)."


stacks:
  - title: "Daily work — files only"
    desc: "Use for day-to-day work when the answer must stay inside the files you provide, with no external lookup."
    items:
      - "/prompts/facts-only-artifacts-only.system.txt"
      - "/prompts/components/deep-read.user.txt"
      - "/prompts/components/deep-scan.user.txt"
      - "/prompts/chain-of-verification.system.txt"
      - "/prompts/confidence-score.system.txt"

  - title: "Daily work — web-verified"
    desc: "Use for day-to-day work when the task depends on current or public facts that must be checked and cited."
    items:
      - "/prompts/facts-only-authoritative-sources-required.system.txt"
      - "/prompts/web-verification-and-citations.system.txt"
      - "/prompts/web-browsing.user.txt"
      - "/prompts/chain-of-verification.system.txt"
      - "/prompts/confidence-score.system.txt"

  - title: "Code Review — Architecture & Boundaries"
    desc: "Use for code review when the main question is whether the system structure, boundaries, ownership, and dependency direction are correct."
    items:
      - "/prompts/facts-only-artifacts-only.system.txt"
      - "/prompts/architecture-boundary-review.system.txt"
      - "/prompts/architecture-boundary-review.user.txt"
      - "/prompts/components/deep-read.user.txt"
      - "/prompts/components/deep-scan.user.txt"
      - "/prompts/chain-of-verification.system.txt"
      - "/prompts/confidence-score.system.txt"

  - title: "Code Review — Implementation vs Official Guidance"
    desc: "Use for code review when code or configuration changes must be checked against official framework, library, runtime, API, or platform guidance."
    items:
      - "/prompts/facts-only-authoritative-sources-required.system.txt"
      - "/prompts/web-verification-and-citations.system.txt"
      - "/prompts/standards-backed-implementation-review.system.txt"
      - "/prompts/standards-backed-implementation-review.user.txt"
      - "/prompts/components/deep-search.user.txt"
      - "/prompts/components/deep-scan.user.txt"
      - "/prompts/chain-of-verification.system.txt"
      - "/prompts/confidence-score.system.txt"

  - title: "Evidence-gated technical writing stack"
    desc: "Use when drafting technical content that must control claims, terminology, and evidence quality before publication."
    items:
      - "/prompts/evidence-gated-technical-writing-gate.system.txt"
      - "/prompts/evidence-gated-technical-writing-gate.user.txt"
      - "/prompts/semantic-accuracy-gate.system.txt"
      - "/prompts/semantic-accuracy-gate.user.txt"
      - "/prompts/confidence-score.system.txt"

  - title: "Scholarly review & synthesis stack"
    desc: "Use when the task is a literature-based scholarly review or cross-source evidence synthesis."
    items:
      - "/prompts/scholarly-evidence-gate.system.txt"
      - "/prompts/literature-review.user.txt"
      - "/prompts/evidence-synthesis.user.txt"

  - title: "Scholarly comparison & gap-mapping stack"
    desc: "Use when the task is to compare sources, identify disagreement, and map evidence gaps."
    items:
      - "/prompts/scholarly-evidence-gate.system.txt"
      - "/prompts/source-comparison.user.txt"
      - "/prompts/gap-mapping.user.txt"

  - title: "Scholarly bibliography & evidence-table stack"
    desc: "Use when the task is to produce source-by-source annotations or a structured evidence table."
    items:
      - "/prompts/scholarly-evidence-gate.system.txt"
      - "/prompts/annotated-bibliography.user.txt"
      - "/prompts/evidence-table.user.txt"

catalog:
  - title: "Evidence modes"
    grid: "c-grid--2"
    items:
      - title: "Facts-only: Artifacts-only (no external sources)"
        desc: "Use when the run must stay strictly inside user-provided artifacts with no external lookup."
        policy: "/policies/facts-only-artifacts-only/"
        howto: "/how-to/facts-only-artifacts-only/"
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"

      - title: "Facts-only: Authoritative sources required (citations required)"
        desc: "Use when claims must be supported by citation-grade external sources rather than unsupported recall."
        policy: "/policies/facts-only-authoritative-sources-required/"
        howto: "/how-to/facts-only-authoritative-sources-required/"
        prompts:
          - "/prompts/facts-only-authoritative-sources-required.system.txt"

      - title: "Web Verification & Citations Policy"
        desc: "Add live browsing, retrieval, and citation output requirements for current or public facts."
        policy: "/policies/web-verification-and-citations/"
        howto: "/how-to/request-web-browsing/"
        span_full: true
        prompts:
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/web-browsing.user.txt"
          - "/prompts/web-verification-procedure.user.txt"
          - "/prompts/citations-output-contract.user.txt"

  - title: "Task workflows"
    grid: "c-grid--2"
    items:
      - title: "Code Review — Architecture & Boundaries"
        desc: "Use for code review when the main question is whether the system structure, layering, boundaries, and ownership are correct."
        policy: "/policies/architecture-boundary-review-policy/"
        howto: "/how-to/architecture-boundary-review-procedure/"
        prompts:
          - "/prompts/architecture-boundary-review.system.txt"
          - "/prompts/architecture-boundary-review.user.txt"

      - title: "Code Review — Implementation vs Official Guidance"
        desc: "Use for code review when code or configuration changes must be checked against official framework, library, runtime, API, or platform guidance."
        policy: "/policies/standards-backed-implementation-review-policy/"
        howto: "/how-to/standards-backed-implementation-review-procedure/"
        prompts:
          - "/prompts/standards-backed-implementation-review.system.txt"
          - "/prompts/standards-backed-implementation-review.user.txt"

      - title: "Evidence-Gated Technical Writing"
        desc: "Use for publishable technical writing where non-trivial claims must be checked before output."
        policy: "/policies/evidence-gated-technical-writing-policy/"
        howto: "/how-to/evidence-gated-technical-writing-gate-procedure/"
        prompts:
          - "/prompts/evidence-gated-technical-writing-gate.system.txt"
          - "/prompts/evidence-gated-technical-writing-gate.user.txt"

  - title: "Scholarly workflows"
    grid: "c-grid--2"
    items:
      - title: "Literature review"
        desc: "Use when you need a focused scholarly review grounded in inspected sources."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/literature-review.user.txt"

      - title: "Evidence synthesis"
        desc: "Use when you need themes, patterns, or positions synthesized across inspected sources."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/evidence-synthesis.user.txt"

      - title: "Source comparison"
        desc: "Use when you need agreements, disagreements, and meaningful differences compared across inspected sources."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/source-comparison.user.txt"

      - title: "Gap mapping"
        desc: "Use when you need to identify where the current evidence is thin, missing, inconsistent, or underexplored."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/gap-mapping.user.txt"

      - title: "Annotated bibliography"
        desc: "Use when you need one annotated entry per inspected source."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/annotated-bibliography.user.txt"

      - title: "Evidence table"
        desc: "Use when you need a structured evidence row for each inspected source or unit of analysis."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/evidence-table.user.txt"

  - title: "Review / enforcement gates"
    grid: "c-grid--2"
    items:
      - title: "Chain-of-Verification"
        desc: "Add a structured self-check loop before final output."
        policy: "/policies/chain-of-verification/"
        howto: "/how-to/chain-of-verification-procedure/"
        prompts:
          - "/prompts/chain-of-verification.system.txt"

      - title: "Semantic Accuracy Gate (Claims + Terminology)"
        desc: "Add a claim and terminology check to suppress overstatement and wording drift."
        policy: "/policies/semantic-accuracy-gate/"
        howto: "/how-to/semantic-accuracy-gate-procedure/"
        prompts:
          - "/prompts/semantic-accuracy-gate.system.txt"
          - "/prompts/semantic-accuracy-gate.user.txt"

      - title: "Scholarly Evidence Gate"
        desc: "Add a scholarly evidence boundary when claims must stay inside inspected scholarly sources and make disagreement, limitations, and source quality visible."
        policy: "/policies/scholarly-literature-review/"
        howto: "/how-to/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"

  - title: "Output modes"
    grid: "c-grid--2"
    items:
      - title: "Evidence-Gated Academic Mode (EGAM)"
        desc: "Use when the output must be written in a formal academic register with authoritative citations and fail-closed behavior."
        policy: "/policies/evidence-gated-academic-mode/"
        howto: "/how-to/evidence-gated-academic-mode/"
        prompts:
          - "/prompts/evidence-gated-academic-mode.system.txt"

  - title: "Defaults & output modifiers"
    grid: "c-grid--3"
    items:
      - title: "Objective Technical Baseline Rules (No Simulation)"
        desc: "Default operating rules for objective, non-simulative technical responses."
        policy: "/policies/objective-technical-operating-profile/"
        prompts:
          - "/prompts/objective-technical-style-non-simulative.system.txt"
          - "/prompts/instruction-hierarchy-and-evidence-boundary.system.txt"

      - title: "Minimal non-speculation baseline"
        desc: "Lightweight default that suppresses speculation without a full gate stack."
        prompts:
          - "/prompts/epistemic-constraints-minimal.system.txt"

      - title: "Confidence score (0–100)"
        desc: "Append a numeric confidence line to standardize uncertainty reporting."
        policy: "/policies/confidence-score/"
        howto: "/how-to/add-confidence-score-to-responses/"
        prompts:
          - "/prompts/confidence-score.system.txt"