catalog:
  - id: evidence-boundaries-facts-only
    title: "Choosing sources for factual answers"
    grid: "c-grid--2"
    items:
      - title: "Choose which sources AI may use for factual answers"
        url: "/how-to/choose-facts-only-evidence-boundary/"
        desc: "Choose whether the answer should come from your files only, from cited public sources, or from an academic-style evidence review."
        policies:
          - title: "Use only the files you provide for factual answers — policy"
            url: "/policies/facts-only-artifacts-only/"
          - title: "Use cited public sources for factual answers — policy"
            url: "/policies/facts-only-authoritative-sources-required/"
          - title: "Academic-style output with cited sources and confidence — policy"
            url: "/policies/evidence-gated-academic-mode/"
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/evidence-gated-academic-mode.system.txt"

      - title: "Answer from the files you provide only (no external sources) — procedure"
        url: "/how-to/facts-only-artifacts-only/"
        desc: "Use this when the answer must come only from files, logs, screenshots, or excerpts you provide."
        policy:
          title: "Use only the files you provide for factual answers(no external sources)"
          url: "/policies/facts-only-artifacts-only/"
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/components/deep-scan.user.txt"

      - title: "Answer with cited public sources (authoritative sources required) — procedure"
        url: "/how-to/facts-only-authoritative-sources-required/"
        desc: "Use this when the answer must be backed by cited public sources such as standards, papers, or official documentation."
        policy:
          title: "Use cited public sources for factual answers(citations required)"
          url: "/policies/facts-only-authoritative-sources-required/"
        prompts:
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/web-browsing.user.txt"

  - id: verification-workflows
    title: "Checking facts and reviewing outputs"
    grid: "c-grid--2"
    items:
      - title: "Run a structured fact-check before the final answer — procedure"
        url: "/how-to/fact-checking-kit/"
        desc: "Use this when you need a repeatable, multi-step fact-checking workflow before final output."
        policies:
          - title: "Use only the files you provide for factual answers — policy"
            url: "/policies/facts-only-artifacts-only/"
          - title: "Use cited public sources for factual answers — policy"
            url: "/policies/facts-only-authoritative-sources-required/"
          - title: "Use web search and cite sources for current or niche claims — policy"
            url: "/policies/web-verification-and-citations/"
          - title: "Add an evidence-based confidence score (0–100) — policy"
            url: "/policies/confidence-score/"
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/web-browsing.user.txt"
          - "/prompts/chain-of-verification.system.txt"
          - "/prompts/confidence-score.system.txt"

      - title: "Verify claims before the final answer — procedure"
        url: "/how-to/chain-of-verification-procedure/"
        desc: "Use this when you want a deliberate verification pass before the final response."
        policy:
          title: "Verify claims before final output — policy"
          url: "/policies/chain-of-verification/"
        prompts:
          - "/prompts/chain-of-verification.system.txt"
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/web-browsing.user.txt"
          - "/prompts/citations-output-contract.user.txt"
          - "/prompts/confidence-score.system.txt"
          - "/prompts/instruction-hierarchy-and-evidence-boundary.system.txt"

      - title: "Check technical writing claims before publication — procedure"
        url: "/how-to/evidence-gated-technical-writing-gate-procedure/"
        desc: "Use this when publishable technical writing must be checked for unsupported or overstated claims."
        policy:
          title: "Check technical writing claims before publication — policy"
          url: "/policies/evidence-gated-technical-writing-policy/"
        prompts:
          - "/prompts/evidence-gated-technical-writing-gate.system.txt"
          - "/prompts/evidence-gated-technical-writing-gate.user.txt"

      - title: "Choose the right code review path"
        url: "/how-to/code-review/"
        desc: "Start here to choose between architecture review and implementation review against official guidance."
        policies:
          - title: "Code review: choose the right policy"
            url: "/policies/code-review/"
          - title: "Review architecture boundaries and layering — policy"
            url: "/policies/architecture-boundary-review-policy/"
          - title: "Check implementation against official guidance — policy"
            url: "/policies/standards-backed-implementation-review-policy/"

      - title: "Review code for architecture boundaries and layering — procedure"
        url: "/how-to/architecture-boundary-review-procedure/"
        desc: "Use this when the main question is whether structure, layering, boundaries, ownership, and dependency direction are correct."
        policy:
          title: "Review architecture boundaries and layering — policy"
          url: "/policies/architecture-boundary-review-policy/"
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/architecture-boundary-review.system.txt"
          - "/prompts/architecture-boundary-review.user.txt"
          - "/prompts/components/deep-read.user.txt"
          - "/prompts/components/deep-scan.user.txt"
          - "/prompts/components/analyze-before-answering.user.txt"

      - title: "Review implementation against official guidance — procedure"
        url: "/how-to/standards-backed-implementation-review-procedure/"
        desc: "Use this when code or configuration changes must be checked against official framework, library, runtime, API, platform, or standards guidance."
        policy:
          title: "Check implementation against official guidance — policy"
          url: "/policies/standards-backed-implementation-review-policy/"
        prompts:
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/standards-backed-implementation-review.system.txt"
          - "/prompts/standards-backed-implementation-review.user.txt"
          - "/prompts/components/deep-search.user.txt"
          - "/prompts/components/deep-scan.user.txt"
          - "/prompts/components/analyze-before-answering.user.txt"

      - title: "Check claims and terminology for technical accuracy — procedure"
        url: "/how-to/semantic-accuracy-gate-procedure/"
        desc: "Use this when you need to prevent overclaims and keep technical terminology consistent."
        policy:
          title: "Check claims and terminology for technical accuracy — policy"
          url: "/policies/semantic-accuracy-gate/"
        prompts:
          - "/prompts/semantic-accuracy-gate.system.txt"
          - "/prompts/semantic-accuracy-gate.user.txt"

  - id: web-verification--citations
    title: "Using web search and citations"
    grid: "c-grid--2"
    items:
      - title: "Ask AI to use web search and cite sources — procedure"
        url: "/how-to/request-web-browsing/"
        desc: "Use this when the answer depends on current, niche, or public information and must include citations."
        policy:
          title: "Use web search and cite sources for current or niche claims — policy"
          url: "/policies/web-verification-and-citations/"
        prompts:
          - "/prompts/web-browsing.user.txt"
          - "/prompts/web-verification-procedure.user.txt"
          - "/prompts/citations-output-contract.user.txt"
          - "/prompts/web-verification-and-citations.system.txt"

  - id: modes--reporting
    title: "Output modes and confidence scoring"
    grid: "c-grid--2"
    items:
      - title: "Write an academic-style evidence review — procedure"
        url: "/how-to/evidence-gated-academic-mode/"
        desc: "Use this when the output must be formal, source-bound, citation-backed, and explicit about confidence."
        policy:
          title: "Academic-style output with cited sources and confidence — policy"
          url: "/policies/evidence-gated-academic-mode/"
        prompts:
          - "/prompts/evidence-gated-academic-mode.system.txt"

      - title: "Add an evidence-based confidence score (0–100) — procedure"
        url: "/how-to/add-confidence-score-to-responses/"
        desc: "Ensure every response includes an evidence-based analytic confidence score."
        policy:
          title: "Add an evidence-based confidence score (0–100) — policy"
          url: "/policies/confidence-score/"
        prompts:
          - "/prompts/confidence-score.system.txt"

  - id: scholarly-review
    title: "Scholarly review"
    grid: "c-grid--2"
    items:
      - title: "Run a scholarly literature review — procedure"
        url: "/how-to/scholarly-literature-review/"
        desc: "Run the scholarly literature review stack to produce one evidence-gated scholarly review output from inspected sources."
        policy:
          title: "Scholarly Literature Review — policy"
          url: "/policies/scholarly-literature-review/"
        prompts:
          - "/prompts/scholarly-evidence-gate.system.txt"
          - "/prompts/literature-review.user.txt"
          - "/prompts/evidence-synthesis.user.txt"
          - "/prompts/source-comparison.user.txt"
          - "/prompts/gap-mapping.user.txt"
          - "/prompts/annotated-bibliography.user.txt"
          - "/prompts/evidence-table.user.txt"
          - "/prompts/components/analyze-before-answering.user.txt"

  - id: tooling--prompting
    title: "Prompting for everyday work"
    grid: "c-grid--2"
    items:
      - title: "Choose the right prompting setup for everyday work"
        url: "/how-to/prompt-engineering-daily-work/"
        desc: "Use this to choose between a files-only setup and a web-verified setup for day-to-day prompting."
        prompts:
          - "/prompts/facts-only-artifacts-only.system.txt"
          - "/prompts/components/deep-read.user.txt"
          - "/prompts/components/deep-scan.user.txt"
          - "/prompts/facts-only-authoritative-sources-required.system.txt"
          - "/prompts/web-verification-and-citations.system.txt"
          - "/prompts/web-browsing.user.txt"
          - "/prompts/chain-of-verification.system.txt"
          - "/prompts/confidence-score.system.txt"

  - id: memory--context-management
    title: "Managing memory and context in AI systems"
    grid: "c-grid--2"
    items:
      - title: "Manage memory and context boundaries in AI systems — procedure"
        url: "/how-to/llm-memory-boundaries/"
        desc: "Use this to make memory behavior more predictable, bounded, and auditable in chat and agentic systems."