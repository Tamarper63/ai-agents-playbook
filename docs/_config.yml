url: https://www.andyagentlab.com
baseurl: ""

lang: en
locale: en_US

theme: jekyll-theme-cayman
google_analytics: G-2ZQ4K2Z02Q

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - reference/code-rpc/

logo: /assets/img/brand/andyagentlab-logo-hands-128h-white-clean.png

twitter:
  card: summary_large_image

palette:
  bg: "#F7F8FA"
  surface: "#FFFFFF"
  text: "#0F172A"
  muted: "#475569"
  accent: "#7A263A"
